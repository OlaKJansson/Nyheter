<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nyheter">
<title>Nyheter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1208; --paper: #f5f0e8; --cream: #ede6d6;
    --gold: #b8860b; --rust: #8b3a0f; --muted: #7a6e5f;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--paper); color: var(--ink);
    min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,58,15,0.05) 0%, transparent 50%);
  }

  /* Masthead */
  .masthead {
    padding: calc(var(--safe-top) + 20px) 24px 0;
    text-align: center; position: relative; z-index: 1;
  }
  .rule { border: none; border-top: 3px double var(--gold); margin-bottom: 10px; }
  .rule-bottom { border: none; border-top: 1px solid var(--gold); margin-top: 10px; }
  .masthead-label { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .masthead-title { font-family: 'Playfair Display', Georgia, serif; font-size: 44px; font-weight: 700; line-height: 1; letter-spacing: -1px; color: var(--ink); margin-bottom: 4px; }
  .masthead-date { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; font-weight: 300; }

  /* Settings button */
  .settings-btn {
    position: absolute; bottom: -18px; right: 20px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--cream); border: 1px solid rgba(184,134,11,0.25);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 100; box-shadow: 0 1px 4px rgba(26,18,8,0.08);
  }
  .settings-btn svg { width: 18px; height: 18px; fill: var(--muted); }

  /* Settings overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,18,8,0.45); z-index: 200; backdrop-filter: blur(3px);
  }
  .overlay.open { display: block; }
  .sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--paper); border-radius: 20px 20px 0 0;
    padding-bottom: calc(var(--safe-bottom) + 20px);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(.4,0,.2,1);
    max-height: 80vh; overflow-y: auto;
  }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(26,18,8,0.15); margin: 12px auto 0; }
  .sheet-title { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; color: var(--ink); padding: 16px 24px 12px; border-bottom: 1px solid rgba(184,134,11,0.2); }
  .sheet-row { padding: 16px 24px; border-bottom: 1px solid rgba(184,134,11,0.1); }
  .sheet-label { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .sheet-input { width: 100%; background: var(--cream); border: 1px solid rgba(184,134,11,0.3); border-radius: 6px; padding: 10px 12px; font-family: 'Source Serif 4', serif; font-size: 14px; color: var(--ink); outline: none; }
  .sheet-input:focus { border-color: var(--gold); }
  .sheet-hint { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 5px; }

  /* Collapsible sections */
  .section-toggle {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none; cursor: pointer;
    padding: 14px 0 0; width: 100%;
  }
  .section-toggle-label { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .section-toggle-line { flex: 1; height: 1px; background: rgba(184,134,11,0.2); }
  .section-toggle-arrow { font-size: 10px; color: var(--muted); transition: transform 0.25s; }
  .section-toggle-arrow.open { transform: rotate(180deg); }
  .section-drawer { overflow: hidden; max-height: 0; transition: max-height 0.35s ease, margin 0.3s ease; margin-top: 0; }
  .section-drawer.open { max-height: 600px; margin-top: 8px; }

  /* Textarea */
  .instr-textarea {
    width: 100%; background: var(--cream); border: 1px solid rgba(184,134,11,0.3); border-radius: 6px;
    padding: 10px 12px; font-family: 'Source Serif 4', serif; font-size: 14px; color: var(--ink);
    resize: none; line-height: 1.5; min-height: 72px; outline: none;
  }
  .instr-textarea:focus { border-color: var(--gold); }
  .instr-textarea::placeholder { color: var(--muted); font-style: italic; }

  /* Sources grid */
  .sources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .source-item {
    display: flex; align-items: center; gap: 7px;
    background: var(--cream); border: 1px solid rgba(184,134,11,0.2);
    border-radius: 6px; padding: 7px 9px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .source-item.checked { background: rgba(184,134,11,0.12); border-color: var(--gold); }
  .source-item input[type=checkbox] { display: none; }
  .source-check {
    width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid rgba(184,134,11,0.4);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--gold); background: white;
  }
  .source-item.checked .source-check { background: var(--gold); border-color: var(--gold); color: white; }
  .source-name { font-size: 12px; color: var(--ink); line-height: 1.2; }
  .sources-section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin: 10px 0 6px; }
  .add-source-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-source-input {
    flex: 1; background: var(--cream); border: 1px solid rgba(184,134,11,0.3); border-radius: 6px;
    padding: 9px 12px; font-family: 'Source Serif 4', serif; font-size: 13px; color: var(--ink); outline: none;
  }
  .add-source-input:focus { border-color: var(--gold); }
  .add-source-btn {
    background: var(--ink); color: var(--paper); border: none; border-radius: 6px;
    padding: 9px 14px; font-size: 13px; cursor: pointer; white-space: nowrap;
  }

  /* Summary */
  .content { flex: 1; padding: 0 20px; position: relative; z-index: 1; display: flex; flex-direction: column; }
  .summary-label { display: flex; align-items: center; gap: 8px; margin: 14px 0 8px; }
  .summary-label-text { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .summary-label-line { flex: 1; height: 1px; background: rgba(184,134,11,0.2); }
  .summary-box {
    background: white; border: 1px solid rgba(184,134,11,0.2); border-radius: 8px;
    padding: 0 16px 16px 19px; flex: 1; position: relative;
    overflow-y: auto; min-height: 120px; -webkit-overflow-scrolling: touch;
  }
  .summary-box::-webkit-scrollbar { display: none; }
  .left-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, var(--gold), var(--rust)); border-radius: 8px 0 0 8px; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 0; color: var(--muted); text-align: center; }
  .empty-icon { font-size: 36px; opacity: 0.45; margin-bottom: 8px; }
  .empty-text { font-size: 13px; font-style: italic; font-weight: 300; }
  .loading-dots { display: flex; gap: 5px; margin-bottom: 10px; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-8px);opacity:1} }
  .summary-content { font-size: 15px; line-height: 1.75; font-weight: 300; color: var(--ink); padding-top: 16px; }
  .summary-content h2, .summary-content h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin: 14px 0 6px; color: var(--rust); line-height: 1.3; }
  .summary-content h2:first-child, .summary-content h3:first-child { margin-top: 0; }
  .summary-content p { margin-bottom: 10px; }
  .summary-content ul { margin: 8px 0 10px 16px; }
  .summary-content li { margin-bottom: 4px; }
  .error-msg { padding: 12px 0; font-size: 13px; color: var(--rust); line-height: 1.5; }

  /* Footer */
  .footer { padding: 12px 20px calc(var(--safe-bottom) + 16px); position: relative; z-index: 1; }
  .fetch-btn { width: 100%; background: var(--ink); color: var(--paper); border: none; border-radius: 10px; padding: 17px 24px; font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.15s; }
  .fetch-btn:active { transform: scale(0.98); }
  .fetch-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
  .timestamp { text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-top: 8px; }
</style>
</head>
<body>

<!-- Settings overlay -->
<div class="overlay" id="overlay" onclick="closeOnBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Inställningar</div>

  </div>
</div>

<!-- Masthead -->
<div class="masthead">
  <hr class="rule">
  <div class="masthead-label">Din dagliga nyhetsbriefing</div>
  <div class="masthead-title">Nyheter</div>
  <div class="masthead-date" id="dateDisplay"></div>
  <hr class="rule-bottom">
  <button class="settings-btn" onclick="openSettings()">
    <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
  </button>
</div>

<!-- Main content -->
<div class="content">

  <!-- Anpassning av innehåll -->
  <button class="section-toggle" onclick="toggleSection('instrDrawer','instrArrow')">
    <span class="section-toggle-label">Anpassning av innehåll</span>
    <span class="section-toggle-line"></span>
    <span class="section-toggle-arrow" id="instrArrow">▼</span>
  </button>
  <div class="section-drawer" id="instrDrawer">
    <textarea class="instr-textarea" id="instructions" placeholder="T.ex: Fokusera på ekonomi och teknik. Håll det kort med 5 punkter per ämne."></textarea>
  </div>

  <!-- Källor -->
  <button class="section-toggle" onclick="toggleSection('sourcesDrawer','sourcesArrow')">
    <span class="section-toggle-label">Källor</span>
    <span class="section-toggle-line"></span>
    <span class="section-toggle-arrow" id="sourcesArrow">▼</span>
  </button>
  <div class="section-drawer" id="sourcesDrawer">
    <div class="sources-section-label">Sverige</div>
    <div class="sources-grid" id="svGrid"></div>
    <div class="sources-section-label">Internationellt</div>
    <div class="sources-grid" id="intGrid"></div>
    <div class="sources-section-label">Egna källor</div>
    <div class="sources-grid" id="customGrid"></div>
    <div class="add-source-row">
      <input class="add-source-input" id="newSource" placeholder="Lägg till källa, t.ex. Wired..." />
      <button class="add-source-btn" onclick="addSource()">+ Lägg till</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-label">
    <span class="summary-label-text">Sammanfattning</span>
    <span class="summary-label-line"></span>
  </div>
  <div class="summary-box">
    <div class="left-bar"></div>
    <div class="empty" id="emptyState">
      <div class="empty-icon">📰</div>
      <div class="empty-text">Tryck på knappen nedan för att hämta dagens nyheter</div>
    </div>
    <div class="empty" id="loadingState" style="display:none">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div style="font-size:13px;font-style:italic;color:var(--muted)">Söker och sammanfattar…</div>
    </div>
    <div id="errorState" style="display:none"></div>
    <div class="summary-content" id="summaryContent" style="display:none"></div>
  </div>
</div>

<div class="footer">
  <button class="fetch-btn" id="fetchBtn" onclick="fetchNews()">
    <span>⚡</span> Hämta dagens nyheter
  </button>
  <div class="timestamp" id="timestamp"></div>
</div>

<script>
// --- Default sources ---
const DEFAULT_SWEDISH = [
  'SVT Nyheter','Aftonbladet','Expressen','Dagens Nyheter','Svenska Dagbladet',
  'Göteborgs-Posten','Sydsvenskan','Dagens industri','Omni','TV4 Nyheterna',
  'Sveriges Radio','Tidningarnas Telegrambyrå (TT)'
];
const DEFAULT_INTL = [
  'BBC News','CNN','Reuters','The Guardian','New York Times',
  'Washington Post','Financial Times','The Economist','Al Jazeera',
  'AP News','Der Spiegel','Le Monde'
];

// --- State ---
let checkedSources = JSON.parse(localStorage.getItem('checkedSources') || 'null');
if (!checkedSources) {
  checkedSources = {};
  DEFAULT_SWEDISH.forEach(s => checkedSources[s] = true);
  DEFAULT_INTL.forEach(s => checkedSources[s] = true);
}
let customSources = JSON.parse(localStorage.getItem('customSources') || '[]');

function saveSourceState() {
  localStorage.setItem('checkedSources', JSON.stringify(checkedSources));
  localStorage.setItem('customSources', JSON.stringify(customSources));
}

function renderSource(name, grid) {
  const item = document.createElement('label');
  item.className = 'source-item' + (checkedSources[name] ? ' checked' : '');
  item.innerHTML = `<input type="checkbox" ${checkedSources[name] ? 'checked' : ''}>
    <span class="source-check">${checkedSources[name] ? '✓' : ''}</span>
    <span class="source-name">${name}</span>`;
  item.querySelector('input').addEventListener('change', e => {
    checkedSources[name] = e.target.checked;
    item.classList.toggle('checked', e.target.checked);
    item.querySelector('.source-check').textContent = e.target.checked ? '✓' : '';
    saveSourceState();
  });
  grid.appendChild(item);
}

function renderCustomSource(name) {
  const grid = document.getElementById('customGrid');
  const item = document.createElement('label');
  item.className = 'source-item' + (checkedSources[name] !== false ? ' checked' : '');
  if (checkedSources[name] === undefined) checkedSources[name] = true;
  item.innerHTML = `<input type="checkbox" ${checkedSources[name] ? 'checked' : ''}>
    <span class="source-check">${checkedSources[name] ? '✓' : ''}</span>
    <span class="source-name">${name}</span>`;
  item.querySelector('input').addEventListener('change', e => {
    checkedSources[name] = e.target.checked;
    item.classList.toggle('checked', e.target.checked);
    item.querySelector('.source-check').textContent = e.target.checked ? '✓' : '';
    saveSourceState();
  });
  grid.appendChild(item);
}

function addSource() {
  const input = document.getElementById('newSource');
  const name = input.value.trim();
  if (!name || customSources.includes(name)) return;
  customSources.push(name);
  checkedSources[name] = true;
  saveSourceState();
  renderCustomSource(name);
  input.value = '';
}

document.getElementById('newSource').addEventListener('keydown', e => { if (e.key === 'Enter') addSource(); });

// Init sources
const svGrid = document.getElementById('svGrid');
const intGrid = document.getElementById('intGrid');
DEFAULT_SWEDISH.forEach(s => renderSource(s, svGrid));
DEFAULT_INTL.forEach(s => renderSource(s, intGrid));
customSources.forEach(s => renderCustomSource(s));

// --- Date ---
const now = new Date();
document.getElementById('dateDisplay').textContent = now.toLocaleDateString('sv-SE', {weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();

// --- API key & instructions ---
const instructionsEl = document.getElementById('instructions');
instructionsEl.value = localStorage.getItem('nyhetsinstruktioner') || '';
instructionsEl.addEventListener('input', () => localStorage.setItem('nyhetsinstruktioner', instructionsEl.value));

// --- Settings sheet ---
function openSettings() { document.getElementById('overlay').classList.add('open'); }
function closeOnBg(e) { if (e.target === document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }

// --- Collapsible sections ---
function toggleSection(drawerId, arrowId) {
  document.getElementById(drawerId).classList.toggle('open');
  document.getElementById(arrowId).classList.toggle('open');
}

// --- Load last summary ---
const lastSummary = localStorage.getItem('senasteSammanfattning');
const lastTime = localStorage.getItem('senasteTid');
if (lastSummary) showSummary(lastSummary, lastTime);

function setState(s) {
  document.getElementById('emptyState').style.display = s==='empty' ? 'flex' : 'none';
  document.getElementById('loadingState').style.display = s==='loading' ? 'flex' : 'none';
  document.getElementById('errorState').style.display = s==='error' ? 'block' : 'none';
  document.getElementById('summaryContent').style.display = s==='summary' ? 'block' : 'none';
}
function showSummary(html, t) {
  document.getElementById('summaryContent').innerHTML = html;
  setState('summary');
  if (t) document.getElementById('timestamp').textContent = 'Uppdaterad ' + t;
}

function md2html(text) {
  return text
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .split('\n\n').map(p => p.match(/^<[hul]/) ? p : p.trim() ? '<p>'+p+'</p>' : '').join('');
}

async function fetchNews() {
  document.getElementById('fetchBtn').disabled = true;
  setState('loading');

  const today = now.toLocaleDateString('sv-SE', {year:'numeric',month:'long',day:'numeric'});
  const instructions = instructionsEl.value.trim();
  const activeSources = Object.entries(checkedSources).filter(([,v])=>v).map(([k])=>k);
  const sourcesText = activeSources.length
    ? `Sök nyheter från följande källor: ${activeSources.join(', ')}.`
    : '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        system: 'Du är en erfaren nyhetsjournalist. Skriv alltid på svenska. Använd markdown med rubriker (##) och punktlistor. Ca 300–500 ord. OBS: Du har inte tillgång till realtidsnyheter, men sammanfatta de senaste nyheterna du känner till och var tydlig om du är osäker på aktualitet.',
        messages: [{ role: 'user', content: `Idag är det ${today}. ${sourcesText}\n\n${instructions || 'Sammanfatta de viktigaste nyheterna från Sverige och världen.'}\n\nStrukturera med tydliga rubriker per ämne. Skriv på svenska.` }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API-fel ' + res.status);
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    if (!text) throw new Error('Inget svar mottogs.');
    const html = md2html(text);
    const t = new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('senasteSammanfattning', html);
    localStorage.setItem('senasteTid', t);
    showSummary(html, t);
  } catch(err) {
    document.getElementById('errorState').innerHTML = '<div class="error-msg">⚠️ ' + (err.message||'Något gick fel.') + '</div>';
    setState('error');
  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}
</script>
</body>
</html>
