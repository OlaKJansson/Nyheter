<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nyheter">
<title>Nyheter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede6d6;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --rust: #8b3a0f;
    --muted: #7a6e5f;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Subtle paper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,58,15,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .masthead {
    padding: calc(var(--safe-top) + 20px) 24px 0;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .masthead-rule {
    border: none;
    border-top: 3px double var(--gold);
    margin-bottom: 10px;
  }

  .masthead-label {
    font-family: 'Source Serif 4', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .masthead-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .masthead-date {
    font-family: 'Source Serif 4', serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .masthead-rule-bottom {
    border: none;
    border-top: 1px solid var(--gold);
    margin-bottom: 0;
  }

  .content {
    flex: 1;
    padding: 0 20px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
  }

  /* Instructions section */
  .instructions-section {
    margin: 16px 0 12px;
  }

  .instructions-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    width: 100%;
    margin-bottom: 0;
  }

  .instructions-toggle-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .instructions-toggle-line {
    flex: 1;
    height: 1px;
    border-top: 1px solid rgba(184,134,11,0.2);
  }

  .instructions-toggle-arrow {
    font-size: 11px;
    color: var(--muted);
    transition: transform 0.25s;
    line-height: 1;
  }

  .instructions-toggle-arrow.open {
    transform: rotate(180deg);
  }

  .instructions-drawer {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, margin-top 0.3s ease;
    margin-top: 0;
  }

  .instructions-drawer.open {
    max-height: 200px;
    margin-top: 8px;
  }

  .section-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--cream);
    border-top: 1px solid rgba(184,134,11,0.2);
  }

  .instructions-textarea {
    width: 100%;
    background: var(--cream);
    border: 1px solid rgba(184,134,11,0.3);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    resize: none;
    line-height: 1.5;
    min-height: 72px;
    outline: none;
    transition: border-color 0.2s;
  }

  .instructions-textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
  }

  .instructions-textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  /* Summary area */
  .summary-area {
    flex: 1;
    margin: 0 0 12px;
    min-height: 120px;
  }

  .summary-box {
    background: white;
    border: 1px solid rgba(184,134,11,0.2);
    border-radius: 8px;
    padding: 16px;
    min-height: 120px;
    position: relative;
    overflow: hidden;
  }

  .summary-box::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--gold), var(--rust));
  }

  .summary-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--muted);
    text-align: center;
  }

  .summary-empty-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .summary-empty-text {
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
  }

  .summary-content {
    font-size: 15px;
    line-height: 1.7;
    font-weight: 300;
    color: var(--ink);
  }

  .summary-content h2, .summary-content h3 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px;
    font-weight: 700;
    margin: 14px 0 6px;
    color: var(--rust);
    line-height: 1.3;
  }

  .summary-content h2:first-child, .summary-content h3:first-child {
    margin-top: 0;
  }

  .summary-content p {
    margin-bottom: 10px;
  }

  .summary-content p:last-child {
    margin-bottom: 0;
  }

  .summary-content strong {
    font-weight: 600;
    color: var(--ink);
  }

  .summary-content ul, .summary-content ol {
    margin: 8px 0 10px 16px;
  }

  .summary-content li {
    margin-bottom: 4px;
  }

  /* Loading state */
  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 0;
    gap: 12px;
  }

  .loading-press {
    display: flex;
    gap: 5px;
  }

  .loading-press span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: press 1.2s ease-in-out infinite;
  }

  .loading-press span:nth-child(2) { animation-delay: 0.2s; }
  .loading-press span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes press {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  .loading-text {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* Error state */
  .error-box {
    background: rgba(139,58,15,0.08);
    border: 1px solid rgba(139,58,15,0.3);
    border-radius: 6px;
    padding: 12px;
    font-size: 13px;
    color: var(--rust);
    line-height: 1.5;
  }

  /* Footer */
  .footer {
    padding: 0 20px calc(var(--safe-bottom) + 16px);
    position: relative;
    z-index: 1;
  }

  .fetch-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    padding: 17px 24px;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .fetch-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    transition: left 0.4s;
  }

  .fetch-btn:active::before { left: 100%; }
  .fetch-btn:active { transform: scale(0.98); }

  .fetch-btn:disabled {
    background: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .btn-icon { font-size: 18px; }

  .timestamp {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 8px;
    font-weight: 300;
  }

  /* Scrollable summary */
  .summary-scroll {
    max-height: calc(100dvh - 400px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .summary-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="masthead">
  <hr class="masthead-rule">
  <div class="masthead-label">Din dagliga nyhetsbriefing</div>
  <div class="masthead-title">Nyheter</div>
  <div class="masthead-date" id="dateDisplay"></div>
  <hr class="masthead-rule-bottom">
</div>

<div class="content">
  <div class="instructions-section">
    <button class="instructions-toggle" onclick="toggleInstructions()" id="toggleBtn">
      <span class="instructions-toggle-label">Instruktioner</span>
      <span class="instructions-toggle-line"></span>
      <span class="instructions-toggle-arrow" id="toggleArrow">▼</span>
    </button>
    <div class="instructions-drawer" id="instructionsDrawer">
      <textarea
        class="instructions-textarea"
        id="instructions"
        placeholder="T.ex: Fokusera på teknik och AI, svenska nyheter, ekonomi och börs. Håll det kort med 5 punkter."
        rows="3"
      ></textarea>
    </div>
  </div>

  <div class="section-label">Sammanfattning</div>
  <div class="summary-area">
    <div class="summary-box">
      <div class="summary-empty" id="emptyState">
        <div class="summary-empty-icon">📰</div>
        <div class="summary-empty-text">Tryck på knappen nedan för att hämta dagens nyheter</div>
      </div>
      <div class="loading-container" id="loadingState" style="display:none">
        <div class="loading-press">
          <span></span><span></span><span></span>
        </div>
        <div class="loading-text">Söker och sammanfattar nyheter…</div>
      </div>
      <div id="errorState" style="display:none"></div>
      <div class="summary-scroll" id="summaryContent" style="display:none"></div>
    </div>
  </div>
</div>

<div class="footer">
  <button class="fetch-btn" id="fetchBtn" onclick="fetchNews()">
    <span class="btn-icon">⚡</span>
    Hämta dagens nyheter
  </button>
  <div class="timestamp" id="timestamp"></div>
</div>

<script>
function toggleInstructions() {
  const drawer = document.getElementById('instructionsDrawer');
  const arrow = document.getElementById('toggleArrow');
  drawer.classList.toggle('open');
  arrow.classList.toggle('open');
}

// Set date
const dateEl = document.getElementById('dateDisplay');
const now = new Date();
dateEl.textContent = now.toLocaleDateString('sv-SE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

// Load saved instructions
const instructionsEl = document.getElementById('instructions');
const saved = localStorage.getItem('nyhetsinstruktioner');
if (saved) instructionsEl.value = saved;

// Save on change
instructionsEl.addEventListener('input', () => {
  localStorage.setItem('nyhetsinstruktioner', instructionsEl.value);
});

// Load last summary if exists
const lastSummary = localStorage.getItem('senasteSammanfattning');
const lastTime = localStorage.getItem('senasteTid');
if (lastSummary) showSummary(lastSummary, lastTime);

function showState(state) {
  document.getElementById('emptyState').style.display = state === 'empty' ? 'flex' : 'none';
  document.getElementById('loadingState').style.display = state === 'loading' ? 'flex' : 'none';
  document.getElementById('errorState').style.display = state === 'error' ? 'block' : 'none';
  document.getElementById('summaryContent').style.display = state === 'summary' ? 'block' : 'none';
}

function showSummary(html, timeStr) {
  document.getElementById('summaryContent').innerHTML = html;
  showState('summary');
  if (timeStr) {
    document.getElementById('timestamp').textContent = 'Uppdaterad ' + timeStr;
  }
}

function markdownToHtml(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[hulo])/gm, '')
    .split('\n').map(line => {
      if (!line.match(/^<[hulo]/)) return line ? '<p>' + line + '</p>' : '';
      return line;
    }).join('')
    .replace(/<p><\/p>/g, '');
}

async function fetchNews() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  showState('loading');

  const instructions = instructionsEl.value.trim();
  const today = now.toLocaleDateString('sv-SE', { year: 'numeric', month: 'long', day: 'numeric' });

  const systemPrompt = `Du är en erfaren nyhetsjournalist som skapar kortfattade, välskrivna nyhetsbriefingar på svenska. 
Skriv alltid på svenska. Var tydlig och strukturerad. Använd markdown med rubriker (##) och punktlistor när det passar.
Håll svaret lagom långt – ungefär 300–500 ord.`;

  const userPrompt = `Idag är det ${today}. Sök efter dagens senaste nyheter och ge mig en sammanfattning.

${instructions ? `Mina instruktioner: ${instructions}` : 'Fokusera på de viktigaste nyheterna från Sverige och världen idag.'}

Strukturera sammanfattningen med tydliga rubriker per ämnesområde. Skriv på svenska.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'API-fel: ' + response.status);
    }

    // Extract text from response (may contain tool_use blocks)
    let resultText = '';
    if (data.content) {
      for (const block of data.content) {
        if (block.type === 'text') {
          resultText += block.text;
        }
      }
    }

    if (!resultText) throw new Error('Inget svar från Claude.');

    const html = '<div class="summary-content">' + markdownToHtml(resultText) + '</div>';
    const timeStr = new Date().toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });

    localStorage.setItem('senasteSammanfattning', html);
    localStorage.setItem('senasteTid', timeStr);

    showSummary(html, timeStr);

  } catch (err) {
    document.getElementById('errorState').innerHTML =
      '<div class="error-box">⚠️ ' + (err.message || 'Något gick fel. Försök igen.') + '</div>';
    showState('error');
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
